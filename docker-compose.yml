version: '3.8'
services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: zambia_procurement
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/src/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    environment:
      DATABASE_URL: postgres://postgres:postgres@db:5432/zambia_procurement
      JWT_SECRET: ${JWT_SECRET}
      NODE_ENV: production
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://localhost}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      SYSTEM_ADMIN_PASSWORD: ${SYSTEM_ADMIN_PASSWORD:-}
      BUSINESS_ADMIN_PASSWORD: ${BUSINESS_ADMIN_PASSWORD:-}
    ports:
      - "4000:4000"
    depends_on:
      db:
        condition: service_healthy
    command: ["sh", "-c", "node src/db/seed.js && node src/index.js"]

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  pgdata:
