services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: zambia_procurement
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -q"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 30s
    networks:
      - app-network

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    environment:
      DATABASE_URL: postgres://postgres:postgres@db:5432/zambia_procurement
      JWT_SECRET: ${JWT_SECRET:-dev_jwt_secret_placeholder_must_change_in_production}
      NODE_ENV: production
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://localhost}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      SYSTEM_ADMIN_PASSWORD: ${SYSTEM_ADMIN_PASSWORD:-}
      BUSINESS_ADMIN_PASSWORD: ${BUSINESS_ADMIN_PASSWORD:-}
      APP_URL: ${APP_URL:-http://localhost}
    ports:
      - "4000:4000"
    depends_on:
      db:
        condition: service_healthy
    command: ["sh", "-c", "DATABASE_URL=$$DATABASE_URL npx node-pg-migrate --migrations-dir src/db/migrations up && node src/index.js"]
    restart: unless-stopped
    networks:
      - app-network

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_started
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  pgdata: